<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Lab 17 AJAX</title>
    <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background: #f5f5f5;
      }

      main {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
      }

      input, button {
        padding: 8px;
        margin: 5px;
      }

      button {
        cursor: pointer;
      }

      #message {
        margin-top: 10px;
        font-weight: bold;
      }

      .info {
        background: #eef4ff;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      #codeResult {
        display: block;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lab 17 AJAX</h1>

      <section class="info">
        <h2>Componentes AJAX utilizados</h2>
        <p>Esta página usa AJAX con fetch para enviar productos al servidor sin recargar la página.</p>
        <p>También carga la lista de productos desde la ruta /products y actualiza la tabla de manera asincrónica.</p>
      </section>

      <section>
        <h2>Agregar producto</h2>
        <form id="myForm">
          <input type="number" id="id" name="id" placeholder="Id">
          <input type="text" id="name" name="name" placeholder="Name">
          <input type="number" id="price" name="price" step="any" placeholder="Price">
          <button type="button" id="submitButton">Guardar producto</button>
        </form>
        <button type="button" id="updateProducts">Actualizar productos</button>
        <p id="message"></p>
      </section>

      <section>
        <h2>Productos</h2>
        <code id="codeResult"></code>
        <div id="wrapper"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>
    <script src="script.js"></script>
  </body>
</html>
